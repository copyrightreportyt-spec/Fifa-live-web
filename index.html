<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ FIFA 26 | Live Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* FIFA 2026 THEMED DESIGN */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            /* ওয়ার্ল্ড কাপ থিমযুক্ত ডার্ক ব্যাকগ্রাউন্ড */
            background: radial-gradient(circle at 50% 50%, #1a1f2c 0%, #05070a 100%);
            background-attachment: fixed;
            color: #fff;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* হেডার এবং লোগো ডিজাইন */
        header {
            position: fixed; top: 0; width: 100%; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            z-index: 1000;
        }

        .logo {
            font-size: 28px; font-weight: 800;
            color: #FFD700; /* গোল্ডেন কালার */
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .player-container {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            width: 85%; height: 60vh;
            background: #000;
            border-radius: 20px;
            border: 2px solid #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            overflow: hidden;
        }

        /* সার্ভার বাটন ডিজাইন */
        .server-box {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px;
        }

        .server-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 12px 25px;
            border: 1px solid #FFD700;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .server-btn:hover, .server-btn.active {
            background: #FFD700;
            color: #000;
            box-shadow: 0 0 20px #FFD700;
        }

        /* মোবাইল রেসপন্সিভ */
        @media (max-width: 768px) {
            .player-container { width: 95%; height: 40vh; top: 100px; }
            .server-box { bottom: 20px; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">FIFA 26 TV</div>
</header>

<div class="player-container">
    <!-- আপনার ভিডিও প্লেয়ার কোড এখানে থাকবে -->
</div>

<div class="server-box">
    <button class="server-btn active">Server 1</button>
    <button class="server-btn">Server 2</button>
    <button class="server-btn">Server 3</button>
</div>

</body>
</html>
