<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VTNHF7TQMV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VTNHF7TQMV');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ LIVE TV | Ultimate Streaming</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://vjs.zencdn.net">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', 'Hind Siliguri', sans-serif;
        }

        body{
            background: radial-gradient(circle at 50% 50%, #0d1b2a 0%, #010814 80%);
            overflow: hidden;
            color: #fff;
            width: 100%;
            height: 100vh;
        }
        
        /* NOTIFICATION BAR */
        .sticky-notice {
            position: fixed; top: 0; left: 0; width: 100%; 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            color: #fff; padding: 12px 40px 12px 15px; font-size: 14px; font-weight: 600;
            z-index: 1000000; display: flex; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .marquee-wrapper { flex: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee-scroll 18s linear infinite; text-shadow: 0 2px 8px rgba(0,198,255,0.6); }
        @keyframes marquee-scroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        .sticky-notice .close-btn { position: absolute; right: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 16px; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* HEADER */
        header{
            position: fixed; top: 48px; left: 0; width: 100%; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(25px); background: rgba(255,255,255,.03);
            border-bottom: 1px solid rgba(255,255,255,.05); z-index: 999;
        }
        body:not(.has-notice) header { top: 0; }
        .logo{ font-size: 26px; font-weight: 800; color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.6); }

        /* PLAYER CONTAINER */
        .player-container {
            position: absolute; top: 150px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 58vh; background: #000; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(0, 196, 255, 0.25);
            z-index: 5;
        }
        body:not(.has-notice) .player-container { top: 95px; height: 63vh; }
        .video-js { width: 100% !important; height: 100% !important; background-color: #000; }
        
        /* CUSTOM CONTROLS UI */
        .video-js .vjs-control-bar {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03)) !important;
            backdrop-filter: blur(25px) saturate(200%) !important;
            -webkit-backdrop-filter: blur(25px) saturate(200%) !important;
            border: 1px solid rgba(255, 255, 255, 0.25) !important; 
            border-radius: 40px !important; bottom: 20px !important; left: 50% !important; 
            transform: translateX(-50%) !important; width: calc(100% - 40px) !important; 
            max-width: 850px !important; height: 54px !important; display: flex !important; 
            align-items: center !important; padding: 0 15px !important;
        }
        .video-js .vjs-button { width: 40px !important; height: 40px !important; display: flex !important; align-items: center !important; justify-content: center !important; border-radius: 50% !important; margin: 0 4px !important; }
        .video-js .vjs-button:hover { background: rgba(255, 255, 255, 0.2) !important; }
        .video-js .vjs-live-control, .video-js .vjs-live-display, .vjs-current-time, .vjs-duration, .vjs-remaining-time, .vjs-time-divider { display: none !important; }

        /* LIVE BADGE */
        .global-live-indicator-box { display: flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.4); padding: 6px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .global-live-badge { background: linear-gradient(135deg, #ff0055, #b3002d); border-radius: 20px; padding: 2px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,85,.7); } 70% { box-shadow: 0 0 0 12px rgba(255,0,85,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,85,0); } }
        .vjs-view-counter { display:flex; align-items:center; color:#fff; font-size:12px; font-weight:600; }

        /* SERVER BOX */
        .server-box {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); padding: 12px 24px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); max-width: 90%;
        }
        .server-btn { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); 
            color:#fff; padding:12px 26px; border-radius:30px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.1); position:relative;
        }
        .server-btn:hover { background: linear-gradient(135deg, #00c6ff, #0072ff); transform:translateY(-2px); }
        .server-btn.active { 
            background: linear-gradient(135deg, #00f2fe, #4facfe); color:#000; font-weight:700; border-color: #00f2fe;
        }
        .badge-live::after { content: 'LIVE'; position: absolute; top: -6px; right: -2px; background: #00FFCC; color: #000; font-size: 8px; font-weight: 900; padding: 1px 5px; border-radius: 6px; }

        /* LOCKER MODAL */
        #content-locker { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(1, 5, 15, 0.9);backdrop-filter:blur(20px);z-index:100000;display:none;align-items:center;justify-content:center; }
        .locker-box { background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.15); padding: 40px 30px; border-radius: 24px; text-align: center; max-width: 440px; width: 90%; }
        .locker-fb-btn { background: linear-gradient(135deg, #1877F2, #0056b3); color: #fff; border:none; width:100%; padding:14px; border-radius:12px; font-weight:800; cursor:pointer; }

        /* RESPONSIVE */
        @media (max-width:768px){
            .sticky-notice { font-size: 12px; padding: 10px 35px 10px 10px; }
            header { top: 40px; padding: 12px 15px; }
            .logo { font-size: 21px; }
            .player-container { top: 115px; height: 35vh; width: 95%; border-radius: 16px; }
            body:not(.has-notice) header { top: 0; }
            body:not(.has-notice) .player-container { top: 72px; height: 38vh; }
            
            .video-js .vjs-control-bar { width:96%!important; bottom:10px!important; height:48px!important; }
            
            .server-box { 
                bottom: 80px !important; width: calc(100% - 24px); padding: 10px; gap: 8px;
                flex-direction: row; flex-wrap: nowrap; justify-content: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; 
                border-radius: 25px;
            }
            .server-box::-webkit-scrollbar { display: none; }
            .server-btn { white-space: nowrap; padding: 10px 18px; font-size: 13px; }
        }
    </style>
</head>
<body class="has-notice">

<!-- TOP NOTICE -->
<div id="sticky-header-notice" class="sticky-notice">
    <div class="marquee-wrapper">
        <span class="marquee-text">📢 বাফারিং বা প্লেব্যাক ইস্যু এড়াতে সমস্যা হলে অন্য যেকোনো সার্ভারে ক্লিক করুন। বিটিভি ও অন্যান্য চ্যানেল আপডেট করা হয়েছে।</span>
    </div>
    <button class="close-btn" onclick="dismissNotice()">&times;</button>
</div>

<!-- HEADER -->
<header>
    <div class="logo">🏆 LIVE TV</div>
    <div class="global-live-indicator-box">
        <div class="global-live-badge">Live</div>
        <div class="vjs-view-counter">
            <span id="liveViewerCount">1.2K</span>
        </div>
    </div>
</header>

<!-- VIDEO COMPONENT -->
<div class="player-container">
    <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted playsinline></video>
</div>

<!-- SERVER CONTROLS -->
<div class="server-box">
    <button id="btn-0" class="server-btn badge-live active" onclick="changeServer('https://b95415.cdn.nextbn.com/video/sports2/index.m3u8', 0)">Server 1</button>
    <button id="btn-1" class="server-btn badge-live" onclick="changeServer('https://b95415.cdn.nextbn.com/video/sports3/index.m3u8', 1)">Server 2</button>
    <button id="btn-2" class="server-btn badge-live" onclick="changeServer('https://b95415.cdn.nextbn.com/video/cricket/index.m3u8', 2)">Server 3</button>
    <button id="btn-3" class="server-btn badge-live" onclick="changeServer('https://edge4.bioscopelive.com/hls/somoytv/index.m3u8', 3)">Somoy TV</button>
    <button id="btn-4" class="server-btn badge-live" onclick="changeServer('https://edge4.bioscopelive.com/hls/jamunatv/index.m3u8', 4)">Jamuna TV</button>
    <button id="btn-5" class="server-btn badge-live" onclick="changeServer('https://b95415.cdn.nextbn.com/video/tsports/index.m3u8', 5)">T Sports</button>
    <button id="btn-6" class="server-btn badge-live" onclick="changeServer('https://edge3.bioscopelive.com/hls/btv/index.m3u8', 6)">BTV</button>
</div>

<!-- FACEBOOK CONTENT LOCKER SYSTEM -->
<div id="content-locker">
    <div class="locker-box">
        <h2>ফেসবুকে ফলো করুন ✋</h2>
        <p>লাইভ প্লেয়ারটি সচল করতে আমাদের অফিসিয়াল পেজটি ফলো করে ৫ সেকেন্ড অপেক্ষা করুন।</p>
        <button id="fbLockerBtn" class="locker-fb-btn" onclick="startUnlockProcess()">ফলো করুন</button>
        <div id="lockerCountdown" style="display:none; color:#00ffcc; margin-top:15px;">যাচাই করা হচ্ছে... <span id="countNumber">৫</span> সেকেন্ড</div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    var player;
    var serverList = [
        "https://b95415.cdn.nextbn.com/video/sports2/index.m3u8",
        "https://b95415.cdn.nextbn.com/video/sports3/index.m3u8",
        "https://b95415.cdn.nextbn.com/video/cricket/index.m3u8",
        "https://edge4.bioscopelive.com/hls/somoytv/index.m3u8",
        "https://edge4.bioscopelive.com/hls/jamunatv/index.m3u8",
        "https://b95415.cdn.nextbn.com/video/tsports/index.m3u8",
        "https://edge3.bioscopelive.com/hls/btv/index.m3u8"
    ];
    var currentIdx = 0;

    function dismissNotice() { document.getElementById('sticky-header-notice').style.display = 'none'; document.body.classList.remove('has-notice'); }

    function startUnlockProcess(){
        window.open('https://www.facebook.com/profile.php?id=61590525141804','_blank');
        document.getElementById('fbLockerBtn').style.display='none';
        document.getElementById('lockerCountdown').style.display='block';
        let count = 5;
        let timer = setInterval(function(){
            count--;
            document.getElementById('countNumber').innerText = count;
            if(count <= 0){
                clearInterval(timer);
                localStorage.setItem('isPremiumUnlocked','true');
                document.getElementById('content-locker').style.display='none';
                if(player) player.play();
            }
        }, 1000);
    }

    document.addEventListener("DOMContentLoaded", function() {
        player = videojs('live-player', {
            autoplay: true,
            muted: true,
            controls: true,
            preload: 'auto',
            fluid: true
        });

        player.ready(function() {
            if (localStorage.getItem('isPremiumUnlocked')) {
                document.getElementById('content-locker').style.display = 'none';
            } else {
                document.getElementById('content-locker').style.display = 'flex';
                player.pause();
            }
            // Load Default Server
            player.src({ src: serverList[0], type: 'application/x-mpegURL' });
        });

        window.changeServer = function(url, index) {
            currentIdx = index;
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + index).classList.add('active');
            
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.load();
            if (localStorage.getItem('isPremiumUnlocked')) {
                player.play().catch(e => console.log("Play interrupted"));
            }
        };

        // Auto Viewer Count Animation
        setInterval(function() {
            let count = (1.0 + Math.random() * 1.5).toFixed(1);
            document.getElementById('liveViewerCount').innerText = count + "K";
        }, 4000);
    });
</script>
</body>
</html>
