        body.has-notice .global-live-indicator-box { top: 60px; }
        
        .server-box { position: absolute; left: 50%; z-index: 9999; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 8px 12px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,.3); bottom: 95px; top: auto !important; transform: translateX(-50%); transition: all 0.4s ease; opacity: 1; visibility: visible; }
        :fullscreen .server-box, :-webkit-full-screen .server-box { display: none !important; }
        
        .global-live-badge { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 20px; padding: 0 14px; height: 32px; display: flex; align-items: center; font-size: 12px; font-weight: 700; letter-spacing: .5px; color: #fff; text-transform: uppercase; }
        .global-live-badge::before { content: ''; display: inline-block; width: 8px; height: 8px; background-color: #ff2a2a; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px rgba(255, 42, 42, 0.8); animation: pulse-dot 1.5s infinite; }
        .vjs-view-counter { display:flex!important;align-items:center!important;color:#fff!important;font-size:13px!important; font-weight:600!important;background:rgba(255, 255, 255, 0.1); padding:0 12px!important;height:32px!important; border-radius:20px!important;border:1px solid rgba(255, 255, 255, 0.2)!important; }
        .vjs-view-counter svg { margin-right:6px; color: #4CAF50; }
        @keyframes pulse-dot{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(255,42,42,.7)}70%{transform:scale(1);box-shadow:0 0 0 6px rgba(255,42,42,0)}100%{transform:scale(.95);box-shadow:0 0 0 0 rgba(255,42,42,0)}}
        
        .server-btn{background:0 0;color:#ccc;padding:8px 16px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;border:none;position:relative;}
        .server-btn:hover{background:rgba(255,255,255,.1);color:#fff}
        .server-btn.active{background:rgba(255,255,255,0.2);color:#fff;box-shadow:0 4px 15px rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4); font-weight:700}
        
        .badge-hd::after { content: 'HD'; position: absolute; top: -6px; right: -4px; background: #00d2ff; color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .badge-4k::after { content: '4K'; position: absolute; top: -6px; right: -4px; background: #FFD700; color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(255,215,0,0.5); }
        
        /* Mobile Responsive Fix */
        @media (max-width:768px){
            .sticky-notice { font-size: 13px; padding: 10px 40px 10px 10px; }
            .global-live-indicator-box { left: 50%; top: 15px; transform: translateX(-50%); padding: 4px 8px; }
            body.has-notice .global-live-indicator-box { top: 50px; }
            .video-js .vjs-control-bar, .fluid_controls_container {width:96%!important;bottom:15px!important;height:48px!important;padding:0 5px!important}
            .video-js .vjs-button{width:30px!important;height:30px!important;margin:0 2px!important}
            .server-box { bottom: 75px !important; width: calc(100% - 40px); box-sizing: border-box; flex-direction: row; flex-wrap: nowrap; justify-content: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .server-box::-webkit-scrollbar { display: none; }
            .server-btn { white-space: nowrap; margin-top: 5px; }
        }

<body class="has-notice">

<!-- LIVE BADGE & VIEWS -->

        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>

    <button id="btn-1" class="server-btn badge-4k" onclick="changeServer('https://trophystream.com/cors-proxy/https/1nyaler.streamhostingcdn.top/stream/23/index.m3u8', 1, '4K')">Server 2</button>
    <button id="btn-2" class="server-btn badge-hd" onclick="changeServer('https://owrcovcrpy.gpcdn.net/bpk-tv/Toffee_Sony_Ten3_HD/output/manifest.m3u8', 2, 'HD')">Server 3</button>

    <button id="btn-5" class="server-btn badge-hd" onclick="changeServer('https://owrcovcrpy.gpcdn.net/bpk-tv/1717/output/index.m3u8', 5, 'HD')">T Sports</button>
    <button id="btn-6" class="server-btn badge-hd" onclick="changeServer('https://owrcovcrpy.gpcdn.net/bpk-tv/Gazi_TV_HD/output/manifest.m3u8', 6, 'HD')">GTV Live</button>

<!-- DEFER SCRIPTS -->
<script defer src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script defer src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

<script defer>
    function dismissNotice() {
        var notice = document.getElementById('sticky-header-notice');
        if (notice) notice.style.display = 'none';
        document.body.classList.remove('has-notice');
    }

    const isCounterEnabled = true;
    const baseViewsAmount = 734;

    var hlsFluid = null;
    var fluidPlayerInstance = null;
    var player = null;

    function initFluidPlayer(url) {
        if(!fluidPlayerInstance && typeof fluidPlayer !== 'undefined') {
            fluidPlayerInstance = fluidPlayer('fluid-player', {
                layoutControls: { fillToContainer: true, primaryColor: "#ffffff", autoPlay: true, mute: true, controlBar: { autoHide: true } }
            });
        }
        var videoEl = document.getElementById('fluid-player');
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            if(hlsFluid) hlsFluid.destroy();
            hlsFluid = new Hls({maxBufferLength: 30});
            hlsFluid.loadSource(url);
            hlsFluid.attachMedia(videoEl);
            hlsFluid.on(Hls.Events.MANIFEST_PARSED, function() {
                videoEl.play().catch(e=>console.log(e));
            });
        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            videoEl.src = url;
            videoEl.play().catch(e=>console.log(e));
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        var serverList = [
            "https://owrcovcrpy.gpcdn.net/bpk-tv/Toffee_Sony_Ten2_HD/output/manifest.m3u8",
            "https://trophystream.com/cors-proxy/https/1nyaler.streamhostingcdn.top/stream/23/index.m3u8",
            "https://owrcovcrpy.gpcdn.net/bpk-tv/Toffee_Sony_Ten3_HD/output/manifest.m3u8",
            "https://owrcovcrpy.gpcdn.net/bpk-tv/Toffee_Sony_Ten2_HD/output/manifest.m3u8",
            "https://owrcovcrpy.gpcdn.net/bpk-tv/Toffee_Sony_Ten3_HD/output/manifest.m3u8",
            "https://owrcovcrpy.gpcdn.net/bpk-tv/1717/output/index.m3u8",
            "https://owrcovcrpy.gpcdn.net/bpk-tv/Gazi_TV_HD/output/manifest.m3u8"
        ];
        var qualityList = ["HD","4K","HD","HD","HD","HD","HD"];
        var currentServerIndex = 0, isSwitching = !1;
        var defaultQuality = 'HD';
        var defaultStream = serverList[0];

        var initPlayers = function() {
            if(typeof videojs === 'undefined') {
                setTimeout(initPlayers, 50);
                return;
            }
            player = videojs('live-player', {
                html5: { vhs: { overrideNative: !0, allowCrossfileNaming: !0 } },
                muted: !0,
                controlBar: { children: ['playToggle', 'volumePanel', 'subsCapsButton', 'pictureInPictureToggle', 'progressControl', 'fullscreenToggle'] }
            });
            player.ready(function(){
                if (isCounterEnabled) {
                    let n = baseViewsAmount + Math.floor(500 * Math.random());
                    const t = document.getElementById('liveViewerCount');
                    function o() {
                        n += Math.floor(300 * Math.random()) - 80;
                        if(t) t.innerText = n >= 1e3 ? (n / 1e3).toFixed(1) + "K" : n.toString();
                        setTimeout(o, 3e3 + 4e3 * Math.random());
                    }
                    o();
                }
                
                // Start default stream on ready
                player.src({src: defaultStream, type: 'application/x-mpegURL'});
                player.load();
                player.play().catch(e => console.log(e));
            });

            window.changeServer = function(e, n, quality) {
                if(n === currentServerIndex) return;
                currentServerIndex = n;
                isSwitching = !1;
                document.querySelectorAll('.server-btn').forEach(btn => btn.classList.remove('active'));
                var t = document.getElementById('btn-'+n);
                if(t) t.classList.add('active');

                if (quality === 'HD') {
                    document.getElementById('fluid-wrapper').style.display = 'none';
                    document.getElementById('vjs-wrapper').style.display = 'block';
                    var fplayer = document.getElementById('fluid-player');
                    if(fplayer && fplayer.pause) fplayer.pause();
                    player.error(null);
                    player.pause();
                    player.src({src:e, type:'application/x-mpegURL'});
                    player.load();
                    player.play().then(function(){isSwitching=!1}).catch(function(err){console.log("Autoplay failed:",err);});
                } else {
                    document.getElementById('vjs-wrapper').style.display = 'none';
                    document.getElementById('fluid-wrapper').style.display = 'block';
                    if(player) player.pause();
                    initFluidPlayer(e);
                    isSwitching = !1;
                }
            };

            player.on('error',function(){
                if(isSwitching) return;
                var e = currentServerIndex + 1;
                if(e < serverList.length) {
                    isSwitching = !0;
                    setTimeout(function(){ changeServer(serverList[e], e, qualityList[e]) }, 3e3);
                }
            });
        };
        initPlayers();
    });

    function manageScreenOrientation() {
        var isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        if (isFullscreen) {
            try {
                if (screen.orientation && screen.orientation.lock) { screen.orientation.lock('landscape').catch(e => console.log(e)); }
            } catch (err) { console.log('Orientation API not supported.'); }
        } else {
            try {
                if (screen.orientation && screen.orientation.unlock) { screen.orientation.unlock(); }
            } catch (err) { console.log('Orientation unlock failed.'); }
        }
    }
    document.addEventListener('fullscreenchange', manageScreenOrientation);
    document.addEventListener('webkitfullscreenchange', manageScreenOrientation);
</script>
</body>
